<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoilIQ - Soil Intelligence & Crop Health System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #2d6a4f;
      --green-light: #40916c;
      --green-pale: #d8f3dc;
      --green-mid: #52b788;
      --yellow: #f4d03f;
      --yellow-dark: #d4ac0d;
      --white: #ffffff;
      --gray-soft: #f8faf8;
      --gray-text: #4a5568;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--gray-soft); color: #1a202c; }
    h1, h2, h3 { font-family: 'DM Serif Display', serif; }
    .btn-primary {
      background: var(--green);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-primary:hover { background: var(--green-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(45,106,79,0.3); }
    .btn-secondary {
      background: transparent;
      color: var(--green);
      border: 2px solid var(--green);
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-secondary:hover { background: var(--green-pale); }
    .btn-yellow {
      background: var(--yellow);
      color: #1a202c;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-yellow:hover { background: var(--yellow-dark); transform: translateY(-1px); }
    input, select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: white;
      color: #1a202c;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(45,106,79,0.1); }
    label { font-size: 13px; font-weight: 600; color: var(--gray-text); margin-bottom: 5px; display: block; }
    .card {
      background: white;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: var(--green);
      color: white;
      display: flex;
      flex-direction: column;
      position: fixed;
      left: 0; top: 0; bottom: 0;
      z-index: 100;
    }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      margin: 2px 8px;
      transition: all 0.2s;
    }
    .sidebar-link:hover, .sidebar-link.active { background: rgba(255,255,255,0.15); color: white; }
    .main-content { margin-left: 240px; min-height: 100vh; padding: 32px; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge-high { background: #d1fae5; color: #065f46; }
    .badge-medium { background: #fef3c7; color: #92400e; }
    .badge-low { background: #fee2e2; color: #991b1b; }
    .alert-error { background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
    .alert-success { background: #d1fae5; color: #065f46; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
    .spinner {
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top: 3px solid white;
      width: 18px; height: 18px;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tab { padding: 10px 20px; cursor: pointer; font-weight: 600; border-bottom: 2px solid transparent; transition: all 0.2s; font-size: 14px; }
    .tab.active { border-bottom: 2px solid var(--green); color: var(--green); }
    .tab:hover { color: var(--green); }
    .progress-bar-wrap { background: #e5e7eb; border-radius: 99px; height: 8px; overflow: hidden; }
    .progress-bar { height: 8px; border-radius: 99px; transition: width 0.6s ease; }
    @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; padding: 16px; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="config/supabase.js"></script>
  <script type="text/babel" src="frontend/auth.js"></script>
  <script type="text/babel" src="frontend/dashboard.js"></script>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
